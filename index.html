<html>
    <link rel="stylesheet" href="styles.css">

<body>
    <!--main header-->
    <div class="title-bar">
        <div class="Options">
            <div class="dropdown">
                <button id="File">File</button>
                <div class="dropdown-content">
                    <button id="new-file">New</button>
                    <button id="open-file">Open</button>
                    <button id="save-file">Save as</button>
                </div>
            </div>
            <div class = "render">
                <button id="render-button">Render</button>
            </div>
        </div>
        
        <!--window controls-->
        <div class="window-controls">
            <button id="minimize">&#x2015;</button>
            <button id="maximize">&#x25A1;</button>
            <button id="close">&#x2715;</button>
        </div>
    </div>

    <!--side bar for the files-->
    <files>
        <ul id="fileList"></ul>
    </files>
    
    <!--main content area-->
    <viewport id="Viewport">
        <div id="Editor"></div>
        
        <div id="Preview">
            
        </div>
    </viewport>

    <script src="renderer.js"></script>
    <script type="module" src="editor.js"></script>
</body>

</html>
